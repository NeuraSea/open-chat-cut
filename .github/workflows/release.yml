name: OpenChatCut Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: Version used for dry-run artifacts (for example 0.1.0-rc.1)
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  portable:
    name: Portable client (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            shell: bash
          - os: macos-14
            target: aarch64-apple-darwin
            shell: bash
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi
      - run: bun install --frozen-lockfile
      - name: Build daemon
        run: cargo build --release --locked -p openchatcut-daemon --bin openchatcutd
      - name: Build standalone Web client
        working-directory: apps/web
        env:
          NEXT_PUBLIC_OPENCHATCUT_API_URL: http://127.0.0.1:3210/api/v1
          NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3100
          BETTER_AUTH_SECRET: release-only-disabled-auth-secret-32-bytes
        run: bun run build
      - name: Package Unix client
        if: runner.os != 'Windows'
        shell: bash
        run: scripts/release/package-unix.sh "${{ steps.version.outputs.value }}" "${{ matrix.target }}" dist
      - name: Package Windows client
        if: runner.os == 'Windows'
        shell: pwsh
        run: scripts/release/package-windows.ps1 -Version "${{ steps.version.outputs.value }}" -Target "${{ matrix.target }}" -OutputDir dist
      - name: Install and smoke portable client on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          stage="dist/openchatcut-${{ steps.version.outputs.value }}-${{ matrix.target }}"
          shell_home="$RUNNER_TEMP/openchatcut-shell-home"
          data_home="$RUNNER_TEMP/openchatcut-data-home"
          install_root="$RUNNER_TEMP/openchatcut-install"
          mkdir -p "$shell_home"
          HOME="$shell_home" \
          OPENCHATCUT_HOME="$data_home" \
          OPENCHATCUT_INSTALL_ROOT="$install_root" \
            "$stage/install.sh" --without-ml --no-plugin --no-start
          python scripts/release/smoke-installed-client.py \
            --app-root "$install_root/current" \
            --home "$data_home"
      - name: Install and smoke portable client on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Stage = "dist\openchatcut-${{ steps.version.outputs.value }}-${{ matrix.target }}"
          $env:OPENCHATCUT_HOME = Join-Path $env:RUNNER_TEMP "openchatcut-data-home"
          $env:OPENCHATCUT_INSTALL_ROOT = Join-Path $env:RUNNER_TEMP "openchatcut-install"
          & "$Stage\install.ps1" -WithoutMl -NoPlugin -NoStart
          python scripts/release/smoke-installed-client.py `
            --app-root $env:OPENCHATCUT_INSTALL_ROOT `
            --home $env:OPENCHATCUT_HOME
      - uses: actions/upload-artifact@v4
        with:
          name: portable-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  containers:
    name: Publish OCI images
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve lowercase image prefix
        id: image
        shell: bash
        run: echo "prefix=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Build and push local Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.prefix }}/web:${{ github.ref_name }}
            ${{ steps.image.outputs.prefix }}/web:latest
          build-args: NEXT_PUBLIC_OPENCHATCUT_API_URL=http://127.0.0.1:3210/api/v1
      - name: Build and push hosted Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.prefix }}/web-hosted:${{ github.ref_name }}
            ${{ steps.image.outputs.prefix }}/web-hosted:latest
          build-args: NEXT_PUBLIC_OPENCHATCUT_API_URL=same-origin
      - name: Build and push full CPU daemon image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/daemon/Dockerfile.full
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.prefix }}/daemon-full:${{ github.ref_name }}
            ${{ steps.image.outputs.prefix }}/daemon-full:latest

  github-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [portable, containers]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: portable-*
          path: artifacts
          merge-multiple: true
      - name: Verify checksums
        run: |
          cd artifacts
          for checksum in *.sha256; do sha256sum --check "$checksum"; done
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.sha256
